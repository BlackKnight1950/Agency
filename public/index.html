<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARC Meeting Review</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --bg:          #ffffff;
      --bg2:         #f7f7f5;
      --bg3:         #f0efec;
      --border:      rgba(0,0,0,0.11);
      --border2:     rgba(0,0,0,0.22);
      --text:        #1a1a1a;
      --text2:       #666;
      --text3:       #999;
      --blue:        #185fa5;
      --blue-bg:     #e6f1fb;
      --blue-text:   #0c447c;
      --green:       #3b6d11;
      --green-bg:    #eaf3de;
      --green-text:  #27500a;
      --amber-bg:    #faeeda;
      --amber-text:  #854f0b;
      --red:         #a32d2d;
      --red-bg:      #fcebeb;
      --red-text:    #791f1f;
      --gray-bg:     #f1efe8;
      --gray-text:   #5f5e5a;
      --radius:      8px;
      --radius-lg:   12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:         #1c1c1a;
        --bg2:        #252523;
        --bg3:        #2e2e2b;
        --border:     rgba(255,255,255,0.10);
        --border2:    rgba(255,255,255,0.20);
        --text:       #f0f0ee;
        --text2:      #aaa;
        --text3:      #666;
        --blue-bg:    #0c2d4a;
        --blue-text:  #85b7eb;
        --green-bg:   #172d08;
        --green-text: #97c459;
        --amber-bg:   #3a2500;
        --amber-text: #fac775;
        --red-bg:     #3a1010;
        --red-text:   #f09595;
        --gray-bg:    #2c2c2a;
        --gray-text:  #aaa;
      }
    }

    body { font-family: var(--font); color: var(--text); background: var(--bg); font-size: 14px; line-height: 1.5; }

    /* ── Layout ── */
    .wrap { max-width: 1440px; margin: 0 auto; padding: 1.5rem 1.25rem; }

    /* ── Header ── */
    .hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 1rem; margin-bottom: 1.5rem;
      border-bottom: 0.5px solid var(--border);
      flex-wrap: wrap; gap: 10px;
    }
    .hdr-title   { font-size: 18px; font-weight: 600; }
    .hdr-sub     { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .hdr-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    /* ── Stat cards ── */
    .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1.5rem; }
    .stat  { background: var(--bg2); border-radius: var(--radius); padding: .75rem 1rem; }
    .stat-lbl { font-size: 11px; text-transform: uppercase; letter-spacing:.04em; color: var(--text2); margin-bottom: 4px; }
    .stat-val { font-size: 24px; font-weight: 600; }
    .c-amber { color: var(--amber-text); }
    .c-green { color: var(--green-text); }
    .c-red   { color: var(--red-text);   }

    /* ── Filters ── */
    .filters { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
    .fbtn {
      font-size: 12px; padding: 4px 14px; border-radius: 20px;
      border: 0.5px solid var(--border2); background: transparent;
      color: var(--text2); cursor: pointer; transition: all .12s;
    }
    .fbtn.on { background: var(--blue-bg); color: var(--blue-text); border-color: var(--blue); }
    .fbtn:hover:not(.on) { background: var(--bg2); }
    .search {
      flex: 1; min-width: 180px; font-size: 13px; padding: 5px 10px;
      border: 0.5px solid var(--border); border-radius: var(--radius);
      background: var(--bg); color: var(--text); font-family: var(--font);
    }
    .search:focus { outline: none; border-color: var(--blue); }

    /* ── Table ── */
    .tbl-wrap { overflow-x: auto; border: 0.5px solid var(--border); border-radius: var(--radius-lg); }
    table  { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      font-size: 11px; font-weight: 600; color: var(--text2); text-align: left;
      padding: 8px 10px; border-bottom: 0.5px solid var(--border);
      background: var(--bg2); white-space: nowrap;
    }
    tbody tr { border-bottom: 0.5px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg2); }
    tbody td { padding: 8px 10px; vertical-align: top; }

    .id-cell  { font-weight: 600; color: var(--blue-text); font-size: 12px; white-space: nowrap; }
    .dim      { color: var(--text2); font-size: 12px; }
    .ell      { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }

    /* ── Badges ── */
    .badge     { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
    .b-pending { background: var(--amber-bg); color: var(--amber-text); }
    .b-approve { background: var(--green-bg);  color: var(--green-text); }
    .b-deny    { background: var(--red-bg);    color: var(--red-text);   }
    .b-tabled  { background: var(--gray-bg);   color: var(--gray-text);  border: 0.5px solid var(--border); }

    /* ── Inline form controls ── */
    .sel, .txa {
      font-size: 12px; padding: 4px 6px; width: 100%;
      border: 0.5px solid var(--border2); border-radius: var(--radius);
      background: var(--bg); color: var(--text); font-family: var(--font);
    }
    .txa { resize: vertical; min-height: 36px; }
    .sel:focus, .txa:focus { outline: none; border-color: var(--blue); }

    /* ── Buttons ── */
    .btn {
      font-size: 12px; padding: 5px 12px; border-radius: var(--radius);
      border: 0.5px solid var(--border2); background: transparent; color: var(--text);
      cursor: pointer; white-space: nowrap; transition: all .12s; font-family: var(--font);
    }
    .btn:hover:not(:disabled) { background: var(--bg2); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-save  { width: 100%; font-size: 11px; padding: 4px 8px; }
    .btn-save:hover:not(:disabled) { background: var(--green-bg); color: var(--green-text); border-color: var(--green); }
    .btn-save.saving { opacity: .5; cursor: not-allowed; }
    .btn-save.saved  { background: var(--green-bg);  color: var(--green-text); border-color: var(--green); }
    .btn-save.err    { background: var(--red-bg);    color: var(--red-text);   border-color: var(--red);   }
    .btn-primary {
      font-size: 13px; padding: 7px 16px; font-weight: 600;
      background: var(--green-bg); color: var(--green-text);
      border-color: var(--green);
    }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-detail {
      font-size: 11px; color: var(--blue-text); background: none; border: none;
      cursor: pointer; text-decoration: underline; margin-top: 4px;
      display: block; width: 100%; text-align: center; font-family: var(--font);
    }
    .pill-changes {
      font-size: 12px; padding: 4px 12px; border-radius: 20px;
      background: var(--amber-bg); color: var(--amber-text);
    }

    /* ── States ── */
    .state {
      text-align: center; padding: 3rem 1rem;
      color: var(--text2); font-size: 14px;
    }
    .state.err {
      color: var(--red-text); background: var(--red-bg);
      border-radius: var(--radius-lg); margin: 1rem 0;
    }
    .spinner {
      width: 28px; height: 28px; margin: 0 auto 1rem;
      border: 2px solid var(--border); border-top-color: var(--blue);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modal ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: flex; align-items: flex-start; justify-content: center;
      padding: 2rem 1rem; z-index: 1000; overflow-y: auto;
    }
    .modal {
      background: var(--bg); border-radius: var(--radius-lg);
      border: 0.5px solid var(--border2);
      width: 100%; max-width: 640px; padding: 1.5rem; margin-bottom: 2rem;
    }
    .modal-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
    .modal-hdr h2 { font-size: 16px; font-weight: 600; }
    .modal-close { background: none; border: none; cursor: pointer; font-size: 22px; color: var(--text2); line-height: 1; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    .fld-lbl { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
    .fld-val { font-size: 13px; }
    .fld-long {
      font-size: 12px; color: var(--text2); line-height: 1.65;
      max-height: 150px; overflow-y: auto;
      background: var(--bg2); padding: 8px; border-radius: var(--radius);
    }

    @media (max-width: 600px) {
      .stats { grid-template-columns: repeat(2,1fr); }
      .grid2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <header class="hdr">
    <div>
      <div class="hdr-title">ARC Meeting Review Log</div>
      <div class="hdr-sub">Agency Staffing — Stakeholder Decision Interface</div>
    </div>
    <div class="hdr-actions">
      <span class="pill-changes" id="pill" style="display:none"></span>
      <button class="btn btn-primary" id="btn-submit-all" onclick="submitAll()" disabled>Submit all decisions</button>
      <button class="btn" onclick="loadData()">↻ Refresh</button>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats" id="stats" style="display:none">
    <div class="stat"><div class="stat-lbl">Total requests</div><div class="stat-val" id="s-total">—</div></div>
    <div class="stat"><div class="stat-lbl">Pending decision</div><div class="stat-val c-amber" id="s-pending">—</div></div>
    <div class="stat"><div class="stat-lbl">Approved</div><div class="stat-val c-green" id="s-approved">—</div></div>
    <div class="stat"><div class="stat-lbl">Denied</div><div class="stat-val c-red" id="s-denied">—</div></div>
  </div>

  <!-- Main -->
  <div id="main"></div>

</div>

<!-- Modal root -->
<div id="modal-root"></div>

<script>
/* ── CONFIG — set via environment, injected at build time ─────────────── */
const REPORT_ID   = '7288028541177732';
const SHEET_ID    = '4795627573563268';
const DEC_COL_ID  = 2002017168084868;   // Agency Request Committee Decision
const CMT_COL_ID  = 6505616795455364;   // Agency Request Committee Comments

/* ── State ────────────────────────────────────────────────────────────── */
let rows    = [];
let changes = {};          // rowId → { decision?, comment?, status? }
let filter  = 'all';

/* ── API calls (to our own Express backend — no keys in browser) ─────── */
async function apiFetch(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

/* ── Load report ──────────────────────────────────────────────────────── */
async function loadData() {
  setMain(loadingHTML('Loading ARC Meeting Review Log…'));
  document.getElementById('stats').style.display = 'none';
  changes = {};
  updatePill();

  try {
    const data = await apiFetch(`/api/report/${REPORT_ID}?pageSize=500`);
    rows = data.rows;
    updateStats();
    renderFilters();
    renderTable();
  } catch (e) {
    setMain(`<div class="state err"><strong>Failed to load data:</strong> ${e.message}<br><br>
      <button class="btn" onclick="loadData()">Try again</button></div>`);
  }
}

/* ── Save a single row ────────────────────────────────────────────────── */
async function saveRow(rowId) {
  const row    = rows.find(r => r.rowId === rowId);
  const change = changes[rowId];
  if (!row || !change) return;

  change.status = 'saving';
  renderTable();

  const dec = change.decision !== undefined ? change.decision : (row.cells['Agency Request Committee Decision'] || '');
  const cmt = change.comment  !== undefined ? change.comment  : (row.cells['Agency Request Committee Comments'] || '');

  try {
    await apiFetch(`/api/sheet/${row.sheetId}/row/${rowId}`, {
      method: 'PATCH',
      body: JSON.stringify({
        cells: [
          { columnId: DEC_COL_ID, value: dec },
          { columnId: CMT_COL_ID, value: cmt }
        ]
      })
    });

    // Persist locally
    row.cells['Agency Request Committee Decision'] = dec;
    row.cells['Agency Request Committee Comments'] = cmt;
    change.status = 'saved';

    setTimeout(() => {
      delete changes[rowId];
      updatePill();
      renderTable();
      updateStats();
    }, 1800);

  } catch (e) {
    change.status = 'error';
    console.error('Save error:', e.message);
  }

  updatePill();
  renderTable();
}

async function submitAll() {
  for (const id of Object.keys(changes)) {
    if (changes[id].status !== 'saving') await saveRow(id);
  }
}

/* ── Change handlers ──────────────────────────────────────────────────── */
function onDec(rowId, val) {
  if (!changes[rowId]) changes[rowId] = {};
  changes[rowId].decision = val;
  delete changes[rowId].status;
  updatePill();
}
function onCmt(rowId, val) {
  if (!changes[rowId]) changes[rowId] = {};
  changes[rowId].comment = val;
  delete changes[rowId].status;
  updatePill();
}

/* ── UI helpers ───────────────────────────────────────────────────────── */
function setMain(html) { document.getElementById('main').innerHTML = html; }

function loadingHTML(msg) {
  return `<div class="state"><div class="spinner"></div>${msg}</div>`;
}

function badge(val) {
  if (!val) return '<span class="badge b-pending">Pending</span>';
  const v = val.toLowerCase();
  if (v.includes('approv'))                       return `<span class="badge b-approve">${val}</span>`;
  if (v.includes('den') || v.includes('reject'))  return `<span class="badge b-deny">${val}</span>`;
  if (v.includes('table'))                        return `<span class="badge b-tabled">${val}</span>`;
  return `<span class="badge b-pending">${val}</span>`;
}

function fmtDate(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' }); }
  catch { return iso.slice(0, 10); }
}

function cv(row, ...keys) {
  for (const k of keys) { if (row.cells[k]) return row.cells[k]; }
  return '—';
}

/* ── Stats ────────────────────────────────────────────────────────────── */
function updateStats() {
  let pending = 0, approved = 0, denied = 0;
  rows.forEach(r => {
    const d = (r.cells['Agency Request Committee Decision'] || '').toLowerCase();
    if (!d)                                              pending++;
    else if (d.includes('approv'))                       approved++;
    else if (d.includes('den') || d.includes('reject'))  denied++;
    else                                                 pending++;
  });
  document.getElementById('s-total').textContent   = rows.length;
  document.getElementById('s-pending').textContent = pending;
  document.getElementById('s-approved').textContent = approved;
  document.getElementById('s-denied').textContent  = denied;
  document.getElementById('stats').style.display   = 'grid';
}

/* ── Pill ─────────────────────────────────────────────────────────────── */
function updatePill() {
  const n   = Object.keys(changes).length;
  const el  = document.getElementById('pill');
  const btn = document.getElementById('btn-submit-all');
  if (n > 0) {
    el.style.display = 'inline-block';
    el.textContent   = `${n} unsaved change${n !== 1 ? 's' : ''}`;
    btn.disabled     = false;
  } else {
    el.style.display = 'none';
    btn.disabled     = true;
  }
}

/* ── Filters ──────────────────────────────────────────────────────────── */
function setFilter(f) {
  filter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.toggle('on', b.dataset.f === f));
  renderTable();
}

function filteredRows() {
  const q = (document.getElementById('search')?.value || '').toLowerCase();
  return rows.filter(r => {
    const d = r.cells['Agency Request Committee Decision'] || '';
    if (filter === 'pending' && d)  return false;
    if (filter === 'decided' && !d) return false;
    if (!q) return true;
    return Object.values(r.cells).some(v => String(v).toLowerCase().includes(q));
  });
}

function renderFilters() {
  const np = rows.filter(r => !r.cells['Agency Request Committee Decision']).length;
  const nd = rows.filter(r =>  r.cells['Agency Request Committee Decision']).length;
  const filtersHTML = `
    <div class="filters">
      <button class="fbtn on" data-f="all"     onclick="setFilter('all')">All (${rows.length})</button>
      <button class="fbtn"    data-f="pending" onclick="setFilter('pending')">Pending (${np})</button>
      <button class="fbtn"    data-f="decided" onclick="setFilter('decided')">Decided (${nd})</button>
      <input class="search" id="search" type="text"
        placeholder="Search by name, position, department…" oninput="renderTable()">
    </div>
    <div id="tbl-area"></div>`;
  setMain(filtersHTML);
}

/* ── Table ────────────────────────────────────────────────────────────── */
function renderTable() {
  const tblArea = document.getElementById('tbl-area');
  if (!tblArea) return;

  const visible = filteredRows();

  if (!visible.length) {
    tblArea.innerHTML = '<div class="state">No matching requests.</div>';
    return;
  }

  const trs = visible.map(r => {
    const id     = r.rowId;
    const ch     = changes[id] || {};
    const dec    = r.cells['Agency Request Committee Decision'] || '';
    const cmt    = r.cells['Agency Request Committee Comments'] || '';
    const curDec = ch.decision !== undefined ? ch.decision : dec;
    const curCmt = ch.comment  !== undefined ? ch.comment  : cmt;
    const dirty  = ch.decision !== undefined || ch.comment !== undefined;
    const st     = ch.status;
    const dis    = st === 'saving' ? 'disabled' : '';

    let sc = 'btn btn-save', sl = 'Save';
    if (st === 'saving') { sc += ' saving'; sl = 'Saving…'; }
    else if (st === 'saved') { sc += ' saved'; sl = '✓ Saved'; }
    else if (st === 'error') { sc += ' err';   sl = 'Retry'; }

    const noSave = !dirty && !dec ? 'disabled' : '';

    const opt = v => `<option value="${v}" ${curDec===v?'selected':''}>${v||'-- Select --'}</option>`;

    return `<tr>
      <td style="width:115px">
        <div class="id-cell">${cv(r,'Request ID#')}</div>
        <div class="dim">${fmtDate(r.createdAt)}</div>
      </td>
      <td style="width:135px">
        <span class="ell" title="${cv(r,'Requestor Name:','Requestor Name')}">${cv(r,'Requestor Name:','Requestor Name')}</span>
      </td>
      <td style="width:160px">
        <span class="ell" title="${cv(r,'Job Position/Title')}">${cv(r,'Job Position/Title')}</span>
        <span class="dim ell">${cv(r,'Department')}</span>
      </td>
      <td style="width:68px;text-align:right">${cv(r,'Hourly Rate:','Hourly Rate')}</td>
      <td style="width:165px">
        <select class="sel" onchange="onDec('${id}',this.value)" ${dis}>
          ${opt('')}
          ${opt('Approved')}
          ${opt('Declined')}
          ${opt('Needs to Consult with BHR')}
        </select>
      </td>
      <td style="width:180px">
        <textarea class="txa" rows="2" placeholder="Add comments…"
          onchange="onCmt('${id}',this.value)" ${dis}>${curCmt}</textarea>
      </td>
      <td style="width:82px;text-align:center">
        <button class="${sc}" onclick="saveRow('${id}')" ${dis||noSave}>${sl}</button>
        <button class="btn-detail" onclick="showDetail('${id}')">Details</button>
      </td>
    </tr>`;
  }).join('');

  tblArea.innerHTML = `
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Request / Date</th><th>Requestor</th><th>Position / Dept</th>
          <th style="text-align:right">Rate</th>
          <th>ARC Decision</th><th>Comments</th>
          <th style="text-align:center">Action</th>
        </tr></thead>
        <tbody>${trs}</tbody>
      </table>
    </div>`;
}

/* ── Detail modal ─────────────────────────────────────────────────────── */
function showDetail(rowId) {
  const r = rows.find(x => x.rowId === rowId);
  if (!r) return;
  const c = r.cells;

  const fields = [
    ['Request ID',              c['Request ID#']],
    ['Requestor',               c['Requestor Name:'] || c['Requestor Name']],
    ['Job Position / Title',    c['Job Position/Title']],
    ['Job Code',                c['Job Code:'] || c['Job Code']],
    ['PID #',                   c['PID#:'] || c['PID#']],
    ['Department',              c['Department']],
    ['Staffing Category',       c['Staffing Category']],
    ['Work Location',           c['Work Location']],
    ['Work Days',               c['Work Days:'] || c['Work Days']],
    ['Shift Time',              c['Shift Time']],
    ['Hours / Day',             c['Number of Hours per Day:'] || c['Number of Hours per Day']],
    ['Duration (months)',       c['Estimated Employment Duration (Months)']],
    ['Budgeted Vacancies',      c['#Budgeted Vacancies for the Same Job Position']],
    ['Current Agency Staff',    c['#Current Agency Staffing in Same Job Position']],
    ['Union Role?',             c['Is This a Union Role?']],
    ['Union Group',             c['Union Group']],
    ['Hourly Rate',             c['Hourly Rate:'] || c['Hourly Rate']],
    ['Office / Program',        c['Office and Program Number']],
    ['Account to Charge',       c['Account to be Charged:'] || c['Account to be Charged']],
    ['RTH Submitted?',          c['Is RTH Submitted for Vacancy?']],
    ['Recruitment Phase',       c['Please Indicate the Recruitment Phase']],
    ['Overtime Offered?',       c['Is Overtime Offered to Current Staff']],
    ['Monthly OT Utilization',  c['Monthly Overtime Utilization']],
  ].filter(([, v]) => v);

  const just   = c['Justification For Using Temporary Labor'] || '';
  const arcDec = c['Agency Request Committee Decision'] || '';
  const arcCmt = c['Agency Request Committee Comments'] || '';

  document.getElementById('modal-root').innerHTML = `
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-hdr">
          <h2>${c['Request ID#'] || 'Request Details'}</h2>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="grid2">
          ${fields.map(([l,v]) => `<div><div class="fld-lbl">${l}</div><div class="fld-val">${v}</div></div>`).join('')}
        </div>
        ${just ? `<div style="margin-top:.75rem"><div class="fld-lbl">Justification for temporary labor</div>
          <div class="fld-long">${just.replace(/\n/g,'<br>')}</div></div>` : ''}
        ${arcDec ? `<div style="margin-top:.75rem"><div class="fld-lbl">ARC Decision</div><div>${badge(arcDec)}</div></div>` : ''}
        ${arcCmt ? `<div style="margin-top:.5rem"><div class="fld-lbl">ARC Comments</div><div class="fld-long">${arcCmt}</div></div>` : ''}
      </div>
    </div>`;
}

function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

/* ── Boot ─────────────────────────────────────────────────────────────── */
loadData();
</script>
</body>
</html>
