services:
  - type: web
    name: arc-meeting-review-app
    env: node
    plan: free                      # upgrade to starter ($7/mo) for always-on
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: SMARTSHEET_TOKEN
        sync: false                 # set manually in Render dashboard — never in code
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
